<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Thalix8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            background: #0a0f1e;
            transition: color 0.2s;
        }

        body.dark {
            color: #f0f3fa;
        }

        body.light {
            color: #1e293b;
        }

        .content-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            width: 820px;
            max-width: 88vw;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .top-bar {
            position: fixed;
            top: 24px;
            right: 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 20;
            background: transparent;
            padding: 4px 8px;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: 0.2s;
            color: inherit;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            background: transparent;
            padding: 4px 8px;
            color: inherit;
        }

        .weather-icon {
            font-size: 1.4rem;
        }

        .weather-temp {
            font-weight: 600;
        }

        .weather-location {
            font-size: 0.85rem;
            opacity: 0.85;
        }

        .search-wrapper {
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(25, 30, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 4px 6px 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        body.light .search-box {
            background: rgba(245, 245, 255, 0.75);
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .search-box:focus-within {
            z-index: 100;
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
        }

        .engine-selector {
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: inherit;
            white-space: nowrap;
        }

        body.light .engine-selector {
            background: rgba(0, 0, 0, 0.08);
        }

        .engine-logo {
            font-size: 1.2rem;
        }

        .dropdown-arrow {
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .engine-dropdown {
            position: absolute;
            top: 70px;
            left: 12px;
            background: rgba(30, 35, 55, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 0;
            min-width: 150px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            z-index: 200;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        body.light .engine-dropdown {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(0, 0, 0, 0.1);
            color: #1e293b;
        }

        .engine-dropdown.show {
            display: block;
        }

        .engine-option {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }

        .engine-option:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 14px 12px;
            font-size: 1.1rem;
            color: inherit;
            font-weight: 450;
        }

        .search-input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .search-btn {
            background: rgba(59, 130, 246, 0.9);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-btn:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        .hitokoto {
            font-size: 0.85rem;
            color: inherit;
            text-align: center;
            letter-spacing: 0.5px;
            margin-top: 6px;
            font-weight: 400;
            backdrop-filter: blur(4px);
            padding: 4px 14px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            max-width: 90%;
        }

        body.light .hitokoto {
            background: rgba(255, 255, 255, 0.3);
        }

        .links-section {
            /* width: 100%; */
            margin-top: 12px;
        }

        .links-row {
            display: flex;
            gap: 1rem;
            /* width: 100%; */
            justify-content: center;
            flex-wrap: wrap;
            /* min-height: 60px; */
        }

        .quick-link {
            /* min-width: 350px; */
            /* aspect-ratio: 6/1.5; */
            flex: 5;
            background: rgba(20, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 0;
            color: inherit;
        }

        .quick-link:active {
            cursor: grabbing;
        }

        body.light .quick-link {
            background: rgba(245, 245, 255, 0.7);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .quick-link:hover {
            background: rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .link-delete-btn {
            background: rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 40px;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            color: #ffaaa5;
            transition: 0.15s;
            flex-shrink: 0;
            margin-left: auto;
            order: 2;
        }

        .link-delete-btn:hover {
            background: rgba(220, 60, 50, 0.8);
            color: white;
            transform: scale(1.05);
        }

        body.light .link-delete-btn {
            background: rgba(0, 0, 0, 0.15);
            color: #b91c1c;
        }

        .link-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            order: 1;
            pointer-events: none;
        }

        .quick-link.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }

        .drag-over {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.3);
        }

        .custom-add-btn {
            flex: 1.5;
            background: rgba(100, 110, 140, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
            font-weight: 500;
            color: inherit;
        }

        .custom-add-btn:hover {
            background: #3b82f6aa;
            border-style: solid;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            transition: filter 0.3s;
        }
    </style>
</head>

<body class="dark">
    <canvas id="weatherCanvas"></canvas>
    <div class="top-bar">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        <div class="weather-info" id="weatherWidget">
            <span class="weather-icon" id="weatherIcon">☁️</span>
            <span class="weather-temp" id="weatherTemp">--°C</span>
            <span class="weather-location" id="weatherLocation">定位中..</span>
        </div>
    </div>
    <div class="content-container">
        <div class="search-wrapper">
            <div class="search-box">
                <div class="engine-selector" id="engineSelector">
                    <span class="engine-logo" id="currentEngineLogo">🌊</span>
                    <span class="engine-name" id="currentEngineName">必应</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索或输入网址..." autocomplete="off">
                <button class="search-btn" id="searchBtn">⚡ 搜索</button>
            </div>
            <div class="engine-dropdown" id="engineDropdown">
                <div class="engine-option" data-engine="sogou" data-logo="🔍"
                    data-url="https://www.sogou.com/web?query=">🔍 搜狗</div>
                <div class="engine-option" data-engine="baidu" data-logo="🐻" data-url="https://www.baidu.com/s?wd=">🐻
                    百度</div>
                <div class="engine-option" data-engine="bing" data-logo="🌊" data-url="https://www.bing.com/search?q=">
                    🌊 必应</div>
                <div class="engine-option" data-engine="google" data-logo="🌐"
                    data-url="https://www.google.com/search?q=">🌐 Google</div>
                <div class="engine-option" data-engine="360" data-logo="🛡️" data-url="https://www.so.com/s?q=">🛡️
                    360搜索</div>
            </div>
        </div>
        <div class="hitokoto" id="hitokotoText">... ...</div>
        <div class="links-section">
            <div class="links-row" id="linksContainer"></div>
        </div>
    </div>
    <script>
        // ---------- API 配置 ----------
        const WEATHER_API = "https://uapis.cn/api/v1/misc/weather?lang=zh";
        const SAYING_API = "https://uapis.cn/api/v1/saying/random?mode=daily";

        let currentWeatherCh = "晴";
        let currentTheme = "dark";
        let weatherTypeForCanvas = "sunny";

        // 搜索引擎配置列表
        const engineList = {
            sogou: { name: "搜狗", logo: "🔍", url: "https://www.sogou.com/web?query=" },
            baidu: { name: "百度", logo: "🐻", url: "https://www.baidu.com/s?wd=" },
            bing: { name: "必应", logo: "🌊", url: "https://www.bing.com/search?q=" },
            google: { name: "Google", logo: "🌐", url: "https://www.google.com/search?q=" },
            "360": { name: "360", logo: "🛡️", url: "https://www.so.com/s?q=" }
        };

        // 默认必应
        let currentEngine = { ...engineList.bing };

        // 快捷链接数据（可排序）
        let customLinks = [
            { name: "GitHub", url: "https://github.com" },
            { name: "知乎", url: "https://zhihu.com" },
            { name: "B站", url: "https://bilibili.com" },
            { name: "LeetCode", url: "https://leetcode.cn" },
            { name: "掘金", url: "https://juejin.cn" }
        ];

        // 拖拽排序相关变量
        let dragSrcIndex = null;

        // ---------- 搜索引擎本地存储 ----------
        function saveEngineToStorage() {
            const engineData = {
                name: currentEngine.name,
                logo: currentEngine.logo,
                url: currentEngine.url
            };
            localStorage.setItem("userSelectedEngine", JSON.stringify(engineData));
        }

        function loadEngineFromStorage() {
            const stored = localStorage.getItem("userSelectedEngine");
            if (stored) {
                try {
                    const engine = JSON.parse(stored);
                    // 验证完整性
                    if (engine.name && engine.logo && engine.url) {
                        currentEngine = engine;
                    } else {
                        currentEngine = { ...engineList.bing };
                    }
                } catch (e) {
                    currentEngine = { ...engineList.bing };
                }
            } else {
                currentEngine = { ...engineList.bing };
            }
            // 更新UI
            document.getElementById("currentEngineLogo").innerHTML = currentEngine.logo;
            document.getElementById("currentEngineName").innerHTML = currentEngine.name;
        }

        // 切换引擎并保存
        function setEngine(engineKey) {
            if (engineList[engineKey]) {
                currentEngine = { ...engineList[engineKey] };
                document.getElementById("currentEngineLogo").innerHTML = currentEngine.logo;
                document.getElementById("currentEngineName").innerHTML = currentEngine.name;
                saveEngineToStorage();
            }
        }

        // ---------- 快捷链接存储 ----------
        function loadLinksFromStorage() {
            const stored = localStorage.getItem("customStartLinks");
            if (stored) {
                try { customLinks = JSON.parse(stored); } catch (e) { }
            }
            renderLinks();
        }
        function saveLinksToStorage() {
            localStorage.setItem("customStartLinks", JSON.stringify(customLinks));
        }
        function deleteLink(index) {
            if (index >= 0 && index < customLinks.length) {
                customLinks.splice(index, 1);
                saveLinksToStorage();
                renderLinks();
            }
        }

        // 重新排序并渲染
        function reorderLinks(fromIndex, toIndex) {
            if (fromIndex === toIndex) return;
            const moved = customLinks[fromIndex];
            customLinks.splice(fromIndex, 1);
            customLinks.splice(toIndex, 0, moved);
            saveLinksToStorage();
            renderLinks();
        }

        // 拖拽事件绑定
        function attachDragEvents(card, idx) {
            card.setAttribute('draggable', 'true');
            card.addEventListener('dragstart', (e) => {
                dragSrcIndex = idx;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', idx);
                card.classList.add('dragging');
            });
            card.addEventListener('dragend', (e) => {
                card.classList.remove('dragging');
                dragSrcIndex = null;
            });
            card.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });
            card.addEventListener('dragenter', (e) => {
                e.preventDefault();
                if (card !== e.target && e.target.closest('.quick-link') && !card.classList.contains('custom-add-btn')) {
                    card.classList.add('drag-over');
                }
            });
            card.addEventListener('dragleave', () => {
                card.classList.remove('drag-over');
            });
            card.addEventListener('drop', (e) => {
                e.preventDefault();
                card.classList.remove('drag-over');
                const targetIdx = idx;
                if (dragSrcIndex !== null && dragSrcIndex !== targetIdx && targetIdx < customLinks.length) {
                    reorderLinks(dragSrcIndex, targetIdx);
                }
            });
        }

        function renderLinks() {
            const container = document.getElementById("linksContainer");
            if (!container) return;
            container.innerHTML = "";
            customLinks.forEach((link, idx) => {
                const card = document.createElement("div");
                card.className = "quick-link";
                const nameSpan = document.createElement("span");
                nameSpan.className = "link-name";
                nameSpan.textContent = link.name.length > 12 ? link.name.slice(0, 10) + "…" : link.name;
                nameSpan.title = link.url;
                const delBtn = document.createElement("button");
                delBtn.className = "link-delete-btn";
                delBtn.innerHTML = "✕";
                delBtn.title = "删除快捷方式";
                delBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    deleteLink(idx);
                });
                delBtn.addEventListener('dragstart', (e) => e.stopPropagation());
                card.appendChild(nameSpan);
                card.appendChild(delBtn);
                card.addEventListener("click", (e) => {
                    if (e.target === delBtn || delBtn.contains(e.target)) return;
                    window.open(link.url, "_blank");
                });
                attachDragEvents(card, idx);
                container.appendChild(card);
            });
            const addBtn = document.createElement("div");
            addBtn.className = "quick-link custom-add-btn";
            addBtn.innerHTML = "+";
            addBtn.setAttribute('draggable', 'false');
            addBtn.addEventListener("click", addCustomLinkDialog);
            container.appendChild(addBtn);
        }

        function addCustomLinkDialog() {
            let linkName = prompt("输入快捷方式名称", "");
            if (!linkName || linkName.trim() === "") return;
            let linkUrl = prompt("输入网址（包含https://）", "");
            if (!linkUrl || linkUrl.trim() === "") return;
            if (!linkUrl.startsWith("http")) linkUrl = "https://" + linkUrl;
            customLinks.push({ name: linkName.trim(), url: linkUrl });
            saveLinksToStorage();
            renderLinks();
        }

        // 获取天气和城市
        async function fetchWeatherAndLocation() {
            try {
                const weatherRes = await fetch(WEATHER_API);
                const weatherData = await weatherRes.json();
                const weatherCh = weatherData.weather || "晴";
                const temp = weatherData.temperature ?? "??";
                const city = weatherData.city || "未知城市";
                currentWeatherCh = weatherCh;
                document.getElementById("weatherIcon").innerHTML = getWeatherEmoji(weatherCh);
                document.getElementById("weatherTemp").innerHTML = `${temp}°C`;
                document.getElementById("weatherLocation").innerHTML = city;
                const mapped = mapWeatherToCanvas(weatherCh);
                weatherTypeForCanvas = mapped;
                initCanvasWeather(weatherTypeForCanvas);
            } catch (err) {
                document.getElementById("weatherLocation").innerHTML = "未知城市";
                weatherTypeForCanvas = "sunny";
                initCanvasWeather("sunny");
            }
        }
        function mapWeatherToCanvas(ch) {
            if (ch.includes("晴")) return "sunny";
            if (ch.includes("多云")) return "cloudy";
            if (ch.includes("阴")) return "overcast";
            if (ch.includes("雨")) return "rain";
            if (ch.includes("雪")) return "snow";
            return "sunny";
        }
        function getWeatherEmoji(ch) {
            if (ch.includes("晴")) return "☀️";
            if (ch.includes("多云")) return "⛅";
            if (ch.includes("阴")) return "☁️";
            if (ch.includes("雨")) return "🌧️";
            if (ch.includes("雪")) return "❄️";
            return "🌈";
        }

        async function fetchHitokoto() {
            try {
                const res = await fetch(SAYING_API);
                const data = await res.json();
                const content = data.item?.content || "金玉其外，败絮其中";
                document.getElementById("hitokotoText").innerHTML = `✦ ${content} ✦`;
            } catch (e) {
                document.getElementById("hitokotoText").innerHTML = "✦ 以梦为马，不负韶华 ✦";
            }
        }

        // ========== Canvas 背景 + 微动态效果 ==========
        const canvas = document.getElementById("weatherCanvas");
        let ctx = canvas.getContext("2d");
        let animationId = null;
        let particles = [];
        let stars = [];
        let cloudOffset = 0;
        let currentCanvasWeather = "sunny";

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (currentCanvasWeather === "rain") initRainParticles();
            else if (currentCanvasWeather === "snow") initSnowParticles();
            initStars();
        }

        function initStars() {
            stars = [];
            let starCount;
            if (currentTheme === "dark" && (currentCanvasWeather === "sunny" || currentCanvasWeather === "cloudy" || currentCanvasWeather === "overcast")) {
                starCount = Math.min(280, Math.floor(canvas.width / 8));
            } else {
                starCount = Math.min(140, Math.floor(canvas.width / 12));
            }
            const baseRadius = (currentTheme === "dark" && (currentCanvasWeather === "sunny" || currentCanvasWeather === "cloudy" || currentCanvasWeather === "overcast")) ? 0.6 : 1.2;
            const radiusRange = (currentTheme === "dark" && (currentCanvasWeather === "sunny" || currentCanvasWeather === "cloudy" || currentCanvasWeather === "overcast")) ? 1.2 : 2.0;
            const alphaBase = (currentTheme === "dark" && (currentCanvasWeather === "sunny" || currentCanvasWeather === "cloudy" || currentCanvasWeather === "overcast")) ? 0.2 : 0.5;
            const alphaRange = (currentTheme === "dark" && (currentCanvasWeather === "sunny" || currentCanvasWeather === "cloudy" || currentCanvasWeather === "overcast")) ? 0.4 : 0.5;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.4,
                    radius: baseRadius + Math.random() * radiusRange,
                    alpha: alphaBase + Math.random() * alphaRange,
                    twinkle: 0.3 + Math.random() * 0.7,
                    speedX: (Math.random() - 0.5) * 0.08,
                    speedY: (Math.random() - 0.5) * 0.05
                });
            }
        }

        function drawStars() {
            if (currentTheme !== "dark") return;
            if (currentCanvasWeather === "rain" || currentCanvasWeather === "snow") return;
            for (let s of stars) {
                const twinkleFactor = 0.7 + 0.3 * Math.sin(Date.now() * 0.002 * s.twinkle);
                let opacity = s.alpha * twinkleFactor;
                let gradientFactor = 1 - (s.y / (canvas.height * 0.5));
                gradientFactor = Math.min(1, Math.max(0, gradientFactor));
                opacity = opacity * gradientFactor;
                if (opacity <= 0.02) continue;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 200, ${opacity})`;
                ctx.fill();
                s.x += s.speedX;
                s.y += s.speedY;
                if (s.x < 0) s.x = canvas.width;
                if (s.x > canvas.width) s.x = 0;
                if (s.y < 0) s.y = canvas.height * 0.4;
                if (s.y > canvas.height * 0.45) s.y = 0;
            }
        }

        function initCanvasWeather(type) {
            currentCanvasWeather = type;
            if (animationId) cancelAnimationFrame(animationId);
            if (type === "rain") initRainParticles();
            else if (type === "snow") initSnowParticles();
            else particles = [];
            initStars();
            drawBackgroundAndWeather();
            startAnimation();
        }

        function initRainParticles() {
            particles = [];
            const count = Math.min(160, Math.floor(canvas.width / 9));
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    len: 12 + Math.random() * 12,
                    speed: 4 + Math.random() * 7,
                    sway: (Math.random() - 0.5) * 0.5
                });
            }
        }
        function initSnowParticles() {
            particles = [];
            const count = Math.min(140, Math.floor(canvas.width / 12));
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: 2 + Math.random() * 4.5,
                    speedY: 0.7 + Math.random() * 1.6,
                    speedX: (Math.random() - 0.5) * 0.4
                });
            }
        }

        function drawBackgroundGradient() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (currentTheme === "dark") {
                gradient.addColorStop(0, "#050a15");
                gradient.addColorStop(0.6, "#14223a");
                gradient.addColorStop(1, "#1f2c44");
            } else {
                gradient.addColorStop(0, "#d9e6f5");
                gradient.addColorStop(1, "#c2d4e8");
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawWeatherEffects() {
            cloudOffset = (cloudOffset + 0.2) % (canvas.width * 2);
            if (currentCanvasWeather === "overcast" || currentCanvasWeather === "cloudy") {
                ctx.fillStyle = `rgba(140, 160, 180, 0.2)`;
                for (let i = 0; i < 8; i++) {
                    ctx.beginPath();
                    ctx.ellipse((canvas.width * 0.1 + cloudOffset * 0.5 + i * 120) % (canvas.width + 200) - 100, canvas.height * 0.12 + Math.sin(Date.now() * 0.0005 + i) * 5, 90, 45, 0, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
            if (currentCanvasWeather === "sunny" && currentTheme === "light") {
                const pulse = 0.8 + 0.2 * Math.sin(Date.now() * 0.002);
                ctx.save();
                ctx.globalAlpha = 0.15 * pulse;
                ctx.fillStyle = "#ffdd99";
                ctx.beginPath();
                ctx.arc(canvas.width * 0.85, canvas.height * 0.15, 110, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawRain() {
            ctx.beginPath();
            ctx.strokeStyle = currentTheme === "dark" ? "#b0d4ff" : "#3a6ea5";
            ctx.lineWidth = 1.2;
            for (let p of particles) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x + p.sway, p.y + p.len);
                ctx.stroke();
            }
        }
        function updateRain() {
            for (let p of particles) {
                p.y += p.speed;
                p.x += p.sway * 0.3;
                if (p.y > canvas.height) {
                    p.y = -p.len;
                    p.x = Math.random() * canvas.width;
                }
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
            }
        }
        function drawSnow() {
            ctx.fillStyle = currentTheme === "dark" ? "#eef4ffcc" : "#ffffffdd";
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
                ctx.fill();
            }
        }
        function updateSnow() {
            for (let p of particles) {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.y > canvas.height) p.y = -8;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
            }
        }

        function drawBackgroundAndWeather() {
            drawBackgroundGradient();
            drawWeatherEffects();
            drawStars();
            if (currentCanvasWeather === "rain") drawRain();
            else if (currentCanvasWeather === "snow") drawSnow();
        }

        function animateCanvas() {
            if (!ctx) return;
            drawBackgroundAndWeather();
            if (currentCanvasWeather === "rain") updateRain();
            else if (currentCanvasWeather === "snow") updateSnow();
            animationId = requestAnimationFrame(animateCanvas);
        }
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            animateCanvas();
        }

        // 主题切换
        function applyTheme(theme) {
            currentTheme = theme;
            document.body.className = theme;
            const toggleBtn = document.getElementById("themeToggle");
            toggleBtn.textContent = theme === "dark" ? "🌙" : "☀️";
            initStars();
            drawBackgroundAndWeather();
        }

        // 搜索引擎下拉菜单
        function initSearchEngine() {
            const selector = document.getElementById("engineSelector");
            const dropdown = document.getElementById("engineDropdown");
            selector.addEventListener("click", (e) => { e.stopPropagation(); dropdown.classList.toggle("show"); });
            document.addEventListener("click", () => dropdown.classList.remove("show"));
            document.querySelectorAll(".engine-option").forEach(opt => {
                opt.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const engineKey = opt.getAttribute("data-engine");
                    if (engineKey) {
                        setEngine(engineKey);
                    }
                    dropdown.classList.remove("show");
                });
            });
            const searchBtn = document.getElementById("searchBtn");
            const searchInput = document.getElementById("searchInput");
            const performSearch = () => {
                let query = searchInput.value.trim();
                if (!query) return;
                window.open(currentEngine.url + encodeURIComponent(query), "_blank");
            };
            searchBtn.addEventListener("click", performSearch);
            searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") performSearch(); });
        }

        // 自动聚焦
        window.addEventListener('load', function () {
            document.getElementById('searchInput').focus();
        });

        (async () => {
            resizeCanvas();
            initSearchEngine();
            loadEngineFromStorage();      // 读取上次保存的搜索引擎
            loadLinksFromStorage();
            await fetchWeatherAndLocation();
            await fetchHitokoto();
            setInterval(() => fetchWeatherAndLocation(), 30 * 60 * 1000);
            setInterval(() => fetchHitokoto(), 6 * 60 * 60 * 1000);
            const themeToggleBtn = document.getElementById("themeToggle");
            themeToggleBtn.addEventListener("click", () => { applyTheme(currentTheme === "dark" ? "light" : "dark"); });
            applyTheme("dark");
            window.addEventListener("resize", () => {
                resizeCanvas();
                if (currentCanvasWeather === "rain") initRainParticles();
                if (currentCanvasWeather === "snow") initSnowParticles();
                initStars();
            });
        })();
    </script>
</body>

</html>
